<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discussion Section Ordering Exercise</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d9e2ef;
      --accent: #2563eb;
      --good: #166534;
      --good-bg: #ecfdf3;
      --bad: #991b1b;
      --bad-bg: #fef2f2;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 18px 54px;
    }

    .card, .tips, .scorebox {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 { margin: 0 0 10px; }

    .subtitle { color: var(--muted); }

    .controls { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: white; }
    .secondary { background: white; border: 1px solid var(--border); }

    .dropzone {
      min-height: 500px;
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 10px;
      background: #fafcff;
    }

    .item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: grab;
    }

    .item.correct { border: 2px solid #8fd4a6; background: #f4fff7; }
    .item.incorrect { border: 2px solid #f1a6a6; background: #fff6f6; }

    .item-label {
      font-weight: bold;
      margin-right: 6px;
      color: #2563eb;
    }

    .move-controls { float: right; }

    .feedback {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .feedback.show { display: block; }

  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <h1>Discussion Section Ordering</h1>
      <p class="subtitle">
        Arrange the following discussion paragraphs into the most logical order.
      </p>

      <div class="controls">
        <button class="primary" onclick="checkAnswers()">Check</button>
        <button class="secondary" onclick="showAnswers()">Show Solution</button>
        <button class="secondary" onclick="resetBoard()">Reset</button>
      </div>
    </div>

    <div class="scorebox">
      <strong id="score">Score: 0 / 5</strong>
    </div>

    <div class="card">
      <div class="dropzone" id="zone"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="tips">
      <ul>
        <li>Start with overall contribution</li>
        <li>Then key findings</li>
        <li>Then implications</li>
        <li>End with limitations</li>
      </ul>
    </div>

  </div>

<script>
const items = [
  {id:1,text:'Overall contribution paragraph...',order:1},
  {id:2,text:'Pre-service fatigue finding...',order:2},
  {id:3,text:'Work fatigue finding...',order:3},
  {id:4,text:'Implications paragraph...',order:4},
  {id:5,text:'Limitations paragraph...',order:5}
];

let dragged=null;
let labelMap={};

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function generateLabels(){
  const letters='ABCDE'.split('');
  shuffle(letters);
  items.forEach((it,i)=>labelMap[it.id]=letters[i]);
}

function createCard(item){
  const div=document.createElement('div');
  div.className='item';
  div.draggable=true;
  div.dataset.id=item.id;
  div.innerHTML=`<span class='item-label'>${labelMap[item.id]}</span>${item.text}
  <span class='move-controls'>
    <button onclick='moveUp(${item.id})'>↑</button>
    <button onclick='moveDown(${item.id})'>↓</button>
  </span>`;

  div.ondragstart=()=>dragged=div;
  return div;
}

const zone=document.getElementById('zone');

zone.ondragover=e=>e.preventDefault();
zone.ondrop=e=>{
  e.preventDefault();
  if(dragged) zone.appendChild(dragged);
}

function moveUp(id){
  const el=document.querySelector(`[data-id='${id}']`);
  if(el && el.previousElementSibling) el.parentNode.insertBefore(el,el.previousElementSibling);
}

function moveDown(id){
  const el=document.querySelector(`[data-id='${id}']`);
  if(el && el.nextElementSibling) el.parentNode.insertBefore(el.nextElementSibling,el);
}

function render(){
  zone.innerHTML='';
  generateLabels();
  shuffle(items).forEach(i=>zone.appendChild(createCard(i)));
}

function checkAnswers(){
  let score=0;
  [...zone.children].forEach((el,i)=>{
    const item=items.find(x=>x.id==el.dataset.id);
    if(item.order===i+1){
      el.classList.add('correct');
      score++;
    } else {
      el.classList.add('incorrect');
    }
  });
  document.getElementById('score').innerText=`Score: ${score}/5`;
}

function showAnswers(){
  zone.innerHTML='';
  items.sort((a,b)=>a.order-b.order).forEach(i=>zone.appendChild(createCard(i)));
}

function resetBoard(){render();}

render();
</script>

<footer style="text-align:center;color:#6b7280;font-size:0.85rem;margin-top:20px;">
Huang et al. (2024). Safety Science.
</footer>

</body>
</html>
